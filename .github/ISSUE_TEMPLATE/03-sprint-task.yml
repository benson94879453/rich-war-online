name: Sprint task
description: Track non-story sprint work such as planning, QA, docs, or technical cleanup.
title: "[Task] "
body:
  - type: input
    id: sprint
    attributes:
      label: Sprint or milestone
      placeholder: "sprint0"
    validations:
      required: true
  - type: textarea
    id: objective
    attributes:
      label: Objective
      description: What should be true when this task is complete?
    validations:
      required: true
  - type: textarea
    id: checklist
    attributes:
      label: Checklist
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Verification
      description: How will this be reviewed or accepted?
    validations:
      required: true
